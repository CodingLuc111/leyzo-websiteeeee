<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hugosmp.net | Coming Soon</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 { font-size: 3rem; margin-bottom: 0.5rem; letter-spacing: 2px; }
        p { color: #888; margin-bottom: 2rem; }
        #countdown { font-size: 5rem; font-weight: bold; color: #10b981; margin: 1rem 0; }
        .discord-btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 12px 30px;
            background-color: #5865F2;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }
        .discord-btn:hover { background-color: #4752c4; transform: scale(1.05); }
        footer { position: absolute; bottom: 20px; font-size: 0.8rem; color: #444; }
    </style>
</head>
<body>

    <div class="container">
        <h1>HUGOSMP.NET</h1>
        <p>Unsere Webseite ist im Aufbau.</p>
        <div id="countdown">60</div>
        <a href="https://discord.gg/qHfwYh8vm" class="discord-btn">Tritt unserem Discord bei</a>
    </div>

    <footer>Created by Leyzo</footer>

    <script>
        let time = 60;
        const countdownEl = document.getElementById('countdown');
        
        const timer = setInterval(() => {
            time--;
            countdownEl.innerText = time;
            if (time <= 0) {
                clearInterval(timer);
                countdownEl.innerText = "Bald!";
            }
        }, 1000);
    </script>
</body>
</html>
