<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>HUGOSMP.NET</title>
    <style>
        body { margin: 0; background: #09090b; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .container { width: 90%; max-width: 600px; }
        h1 { font-size: 3rem; margin-bottom: 0.5rem; }
        .countdown { display: flex; justify-content: center; gap: 10px; margin: 30px 0; }
        .box { background: #18181b; padding: 15px; border-radius: 8px; width: 60px; }
        .number { font-size: 1.5rem; font-weight: bold; display: block; }
        .label { font-size: 0.6rem; color: #71717a; }
        .discord-btn { background: #5865F2; color: white; padding: 12px 25px; text-decoration: none; border-radius: 6px; display: inline-block; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="color: #5865F2;">Leyzo</h2>
        <h1>Leyzo</h1>
        <p style="color: #a1a1aa;">Ein neues Kapitel beginnt.</p>

        <div class="countdown">
            <div class="box"><span id="d" class="number">0</span><span class="label">TAGE</span></div>
            <div class="box"><span id="h" class="number">0</span><span class="label">STD</span></div>
            <div class="box"><span id="m" class="number">0</span><span class="label">MIN</span></div>
            <div class="box"><span id="s" class="number">0</span><span class="label">SEK</span></div>
        </div>

        <a href="https://discord.gg/qHfwYh8vmc" class="discord-btn">Tritt dem Discord bei</a>
    </div>

    <script>
        const target = new Date("May 18, 2026 00:00:00").getTime();
        function update() {
            const now = new Date().getTime();
            const diff = target - now;
            document.getElementById("d").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("h").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("m").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("s").innerText = Math.floor((diff % (1000 * 60)) / 1000);
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
