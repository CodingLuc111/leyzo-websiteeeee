<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leyzo Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6538127875520362" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg:#07070f;--bg2:#0d0d1a;--bg3:#131324;--bg4:#0a0a18;
            --glass:rgba(255,255,255,0.04);--glass-b:rgba(255,255,255,0.07);--glass-hv:rgba(255,255,255,0.09);
            --accent:#f59e0b;--accent2:#fbbf24;--accent-d:rgba(245,158,11,0.13);--accent-d2:rgba(245,158,11,0.22);
            --text:#eeeef8;--text-dim:rgba(238,238,248,0.52);--text-fnt:rgba(238,238,248,0.24);
            --red:#f87171;--red-d:rgba(248,113,113,0.13);
            --green:#4ade80;--green-d:rgba(74,222,128,0.12);
            --blue:#60a5fa;--blue-d:rgba(96,165,250,0.12);
            --purple:#a78bfa;--purple-d:rgba(167,139,250,0.12);
            --orange:#fb923c;--orange-d:rgba(251,146,60,0.12);
            --r:13px;--sw:248px;--shadow:0 8px 32px rgba(0,0,0,0.55);
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}
        ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--glass-b);border-radius:99px}

        .bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0;background:
          radial-gradient(ellipse 80% 50% at 15% 5%,rgba(245,158,11,0.07) 0%,transparent 55%),
          radial-gradient(ellipse 60% 40% at 85% 90%,rgba(96,165,250,0.05) 0%,transparent 55%)}

        /* SIDEBAR */
        .sidebar{width:var(--sw);min-width:var(--sw);height:100%;background:var(--bg2);border-right:1px solid var(--glass-b);display:flex;flex-direction:column;padding:20px 12px;z-index:10;overflow-y:auto}
        .sb-logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--accent);padding:4px 10px;margin-bottom:24px;display:flex;align-items:center;gap:8px}
        .sb-nav{display:flex;flex-direction:column;gap:2px}
        .sb-link{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;font-size:13.5px;color:var(--text-dim);cursor:pointer;transition:all .18s;user-select:none}
        .sb-link:hover{background:var(--glass);color:var(--text)}
        .sb-link.active{background:var(--accent-d);color:var(--accent);font-weight:500}

        /* ADS STYLING */
        .sb-ad-wrap { margin: 10px 0; border-radius: 10px; overflow: hidden; border: 1px solid var(--glass-b); background: var(--glass); min-height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .sb-ad-label { font-size: 9px; color: var(--text-fnt); text-transform: uppercase; letter-spacing: .08em; font-weight: 700; padding: 5px; text-align: center; }

        /* MAIN CONTENT */
        .main{flex:1;overflow:hidden;display:flex;flex-direction:column}
        .page{display:none;height:100%;overflow-y:auto;padding:34px 38px;}
        .page.active{display:block; animation:pageIn .25s ease}
        @keyframes pageIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .page-title{font-family:'Syne',sans-serif;font-size:25px;font-weight:800;letter-spacing:-.5px;margin-bottom:10px}

        /* GAME HUB GRID SYSTEM */
        .game-hub-layout { display: flex; gap: 20px; align-items: flex-start; justify-content: center; }
        .side-ad-container { width: 160px; min-width: 160px; height: 600px; background: var(--glass); border: 1px solid var(--glass-b); border-radius: var(--r); position: sticky; top: 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
        .games-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        
        .game-card { aspect-ratio: 1/1; background: var(--bg3); border-radius: 15px; overflow: hidden; border: 1px solid var(--glass-b); transition: 0.3s; cursor: pointer; position: relative; }
        .game-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .game-card img { width: 100%; height: 100%; object-fit: cover; }
        .game-info { position: absolute; bottom: 0; width: 100%; padding: 8px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); font-size: 11px; text-align: center; font-weight: 600; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <aside class="sidebar">
        <div class="sb-logo">LEYZO</div>
        <nav class="sb-nav">
            <div class="sb-link active" onclick="nav('home')">🏠 Dashboard</div>
            <div class="sb-link" onclick="nav('games')">🎮 Spiele</div>
            <div class="sb-link" onclick="nav('notes')">📝 Notizen</div>
            <div class="sb-link" onclick="nav('settings')">⚙️ Einstellungen</div>
        </nav>

        <div class="sb-spacer" style="flex:1"></div>

        <div class="sb-ad-wrap">
            <div class="sb-ad-label">Anzeige</div>
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-6538127875520362" data-ad-slot="7841563313" data-ad-format="auto" data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
    </aside>

    <main class="main">
        <section id="page-home" class="page active">
            <h1 class="page-title">Willkommen bei Leyzo</h1>
            <p style="color:var(--text-dim)">Dein persönliches Dashboard ist bereit.</p>
        </section>

        <section id="page-games" class="page">
            <h1 class="page-title">Game Hub</h1>
            
            <div class="game-hub-layout">
                <div class="side-ad-container">
                    <div class="sb-ad-label">Anzeige</div>
                    <ins class="adsbygoogle" style="display:inline-block;width:160px;height:600px" data-ad-client="ca-pub-6538127875520362" data-ad-slot="7841563313"></ins>
                    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
                </div>

                <div class="games-grid">
                    <div class="game-card" onclick="window.open('https://poki.com/de/g/subway-surfers', '_blank')">
                        <img src="https://img.poki.com/cdn-cgi/image/quality=70,width=204,height=204,fit=cover,f=auto/b5336181b5394200787e60d5e1676d1e.png">
                        <div class="game-info">Subway Surfers</div>
                    </div>
                    <div class="game-card" onclick="window.open('https://poki.com/de/g/monkey-mart', '_blank')">
                        <img src="https://img.poki.com/cdn-cgi/image/quality=70,width=204,height=204,fit=cover,f=auto/c4a9a08e086629215088be373d328905.png">
                        <div class="game-info">Monkey Mart</div>
                    </div>
                    <div class="game-card" onclick="window.open('https://poki.com/de/g/drive-mad', '_blank')">
                        <img src="https://img.poki.com/cdn-cgi/image/quality=70,width=204,height=204,fit=cover,f=auto/3673efc76d91f28b264e0a778e87360a.png">
                        <div class="game-info">Drive Mad</div>
                    </div>
                    </div>

                <div class="side-ad-container">
                    <div class="sb-ad-label">Anzeige</div>
                    <ins class="adsbygoogle" style="display:inline-block;width:160px;height:600px" data-ad-client="ca-pub-6538127875520362" data-ad-slot="7841563313"></ins>
                    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
                </div>
            </div>
        </section>

        <section id="page-notes" class="page">
            <h1 class="page-title">Notizen</h1>
        </section>

        <section id="page-settings" class="page">
            <h1 class="page-title">Einstellungen</h1>
        </section>
    </main>

    <script>
        // Navigation Logik
        function nav(pageId) {
            // Alle Seiten verstecken
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // Alle Links deaktivieren
            document.querySelectorAll('.sb-link').forEach(l => l.classList.remove('active'));
            
            // Zielseite anzeigen
            document.getElementById('page-' + pageId).classList.add('active');
            
            // Aktuellen Link markieren
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
